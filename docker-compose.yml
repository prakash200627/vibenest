services:
  nginx:
    image: nginx:alpine

    container_name: vibenest-nginx

    restart: unless-stopped

    depends_on:
      - backend
      - frontend

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: vibenest-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: vibenest-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: vibenest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibenest"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: bhavaniprakash/vibenest-backend:latest

    container_name: vibenest-backend

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}

    ports:
      - "8000:8000"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: bhavaniprakash/vibenest-frontend:latest

    container_name: vibenest-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_started

    ports:
      - "3000:80"
    

volumes:
  postgres_data:
